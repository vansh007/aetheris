paths:
  raw_data: "data/raw/aqi.csv"
  processed_data: "data/processed/"
  models_dir: "models/"
  figures_dir: "reports/figures/"

data:
  date_format: "%d-%m-%Y"
  target_regression: "aqi_value"
  target_classification: "aqi_category_num"
  drop_columns: ["unit", "note"]
  aqi_bins: [0, 50, 100, 200, 300, 400, 500]
  aqi_labels: ["Good", "Satisfactory", "Moderate", "Poor", "Very Poor", "Severe"]

preprocessing:
  test_size: 0.2
  random_state: 42

feature_engineering:
  lag_features: [1, 3, 7, 14, 30]
  rolling_windows: [3, 7, 14, 30]

models:
  cv_folds: 5
  random_state: 42

clustering:
  n_clusters_range: [2, 3, 4, 5, 6, 7, 8, 9]
  min_city_records: 30
  anomaly_contamination: 0.02

timeseries:
  forecast_days: 7
  test_days: 30
  arima_order: [5, 1, 2]
  default_city: "Delhi"
